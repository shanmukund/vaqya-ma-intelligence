name: RCM Target Scraper

on:
  # Run every Monday at 6 AM UTC (1 AM EST)
  schedule:
    - cron: '0 6 * * 1'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      sources:
        description: |
          Sources to run (blank = auto: free + Bing/Brave if keys are set).
          Options: nppes,indeed,sos,yellowpages,clutch,hfma_mgma,linkedin,bing
          Phase 2 paid (add manually): google_maps
        required: false
        default: ''
      metros:
        description: 'Comma-separated metro names to limit scope (blank = all 47)'
        required: false
        default: ''
      tech_scan:
        description: 'Run website tech signal detection (slow but adds signals)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write   # needed to commit rcm_targets.json back

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      # ── 3. Show which keys are active ──────────────────────────────────────
      - name: Show active API keys
        run: |
          echo "=== Active API keys this run ==="
          if [ -n "${{ secrets.BRAVE_API_KEY }}" ]; then
            echo "  ✅ BRAVE_API_KEY  — Brave Search (\$5/1K, \$5 free credit/mo) — ACTIVE"
            echo "                     LinkedIn upgraded: Brave → DuckDuckGo fallback"
          else
            echo "  ⬜ BRAVE_API_KEY  — not set → LinkedIn uses DuckDuckGo (always free)"
            echo "                     Optional: brave.com/search/api (\$5 free credits/mo)"
          fi
          echo "  ── Phase 2 paid (not active yet) ──"
          if [ -n "${{ secrets.SERPAPI_KEY }}" ]; then
            echo "  ✅ SERPAPI_KEY        — SerpAPI (paid) — ACTIVE"
          else
            echo "  ⬜ SERPAPI_KEY        — Phase 2 paid"
          fi
          if [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]; then
            echo "  ✅ GOOGLE_MAPS_API_KEY — Google Maps (paid) — ACTIVE"
          else
            echo "  ⬜ GOOGLE_MAPS_API_KEY — Phase 2 paid"
          fi

      # ── 4. Run scraper ─────────────────────────────────────────────────────
      - name: Run RCM target scraper
        working-directory: scraper
        env:
          # ── Low-cost key ($5 free credits/mo auto-applied) ───────────────
          BRAVE_API_KEY:       ${{ secrets.BRAVE_API_KEY }}
          # ── Phase 2 paid keys (leave blank until Phase 2) ─────────────────
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SERPAPI_KEY:         ${{ secrets.SERPAPI_KEY }}
        run: |
          # If --sources blank, Python auto-detects based on env keys present
          SOURCES="${{ github.event.inputs.sources }}"
          METROS="${{ github.event.inputs.metros }}"
          TECH="${{ github.event.inputs.tech_scan || 'false' }}"

          # Build command — leave --sources out if blank so auto-detect fires
          CMD="python scrape_rcm_targets.py"
          if [ -n "$SOURCES" ]; then CMD="$CMD --sources $SOURCES"; fi
          if [ -n "$METROS" ];  then CMD="$CMD --metros \"$METROS\""; fi
          if [ "$TECH" = "false" ]; then CMD="$CMD --no-tech-scan"; fi

          echo "Running: $CMD"
          eval $CMD

      # ── 5. Copy output to root for GitHub Pages ────────────────────────────
      - name: Copy rcm_targets.json to repo root
        run: |
          if [ -f scraper/rcm_targets.json ]; then
            cp scraper/rcm_targets.json rcm_targets.json
            echo "Copied rcm_targets.json to root"
          else
            echo "No rcm_targets.json produced — skipping copy"
          fi

      # ── 6. Commit results ──────────────────────────────────────────────────
      - name: Commit and push scraper output
        run: |
          git config user.name  "Vaqya Scraper Bot"
          git config user.email "scraper@vaqya.com"

          git add scraper/rcm_targets.json rcm_targets.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit — scraper produced no new data."
          else
            COUNT=$(python -c "
          import json, sys
          try:
            data = json.load(open('scraper/rcm_targets.json'))
            print(data.get('total_count', 0))
          except:
            print('unknown')
          ")
            # Note which keys were active in commit message
            KEYS=""
            [ -n "${{ secrets.BRAVE_API_KEY }}" ]        && KEYS="${KEYS}brave,"
            [ -n "${{ secrets.SERPAPI_KEY }}" ]          && KEYS="${KEYS}serpapi,"
            [ -n "${{ secrets.GOOGLE_MAPS_API_KEY }}" ]  && KEYS="${KEYS}gmaps,"
            KEYS="${KEYS:-free-only}"

            git commit -m "scraper: $COUNT targets [$(date -u '+%Y-%m-%d')] keys:${KEYS%,}"
            git push origin main
            echo "Pushed updated rcm_targets.json ($COUNT targets)"
          fi

      # ── 7. Summary ─────────────────────────────────────────────────────────
      - name: Scrape summary
        if: always()
        run: |
          if [ -f scraper/rcm_targets.json ]; then
            python -c "
          import json
          data = json.load(open('scraper/rcm_targets.json'))
          targets = data.get('targets', [])
          tiers   = {}
          sources = {}
          states  = {}
          for t in targets:
            tier = (t.get('scores') or {}).get('priority_tier', '-')
            tiers[tier] = tiers.get(tier, 0) + 1
            for s in (t.get('source') or []):
              sources[s] = sources.get(s, 0) + 1
            st = t.get('state','?')
            states[st] = states.get(st, 0) + 1
          print(f'Total targets: {len(targets)}')
          print('Priority tiers:')
          for tier in ['A','B','C','D','-']:
            if tier in tiers:
              print(f'  Tier {tier}: {tiers[tier]}')
          print('Sources:')
          for s,c in sorted(sources.items(), key=lambda x:-x[1]):
            print(f'  {s}: {c}')
          print('Top states:')
          for s,c in sorted(states.items(), key=lambda x:-x[1])[:8]:
            print(f'  {s}: {c}')
          "
          else
            echo "No output file found."
          fi
